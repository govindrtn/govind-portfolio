<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Govind Maithil - Frontend Developer & React Specialist. Build modern, responsive web applications."
    />
    <meta name="theme-color" content="#3B82F6" />
    <title>Govind Maithil - Frontend Developer & React Specialist</title>
    <script>
      const savedTheme = localStorage.getItem("theme");
      const savedTemplate = localStorage.getItem("portfolio-template") || "ocean";
      const savedLayout = localStorage.getItem("portfolio-layout") || "classic";
      const prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
      document.documentElement.dataset.template = savedTemplate;
      document.documentElement.dataset.layout = savedLayout;
      document.documentElement.classList.toggle(
        "dark",
        savedTheme ? savedTheme === "dark" : prefersDark,
      );
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
